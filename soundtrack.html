<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Road Trip Soundtrack · RT2K15</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900;950&family=JetBrains+Mono:wght@500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="soundtrack.css" />
</head>

<body>
  <div class="soundtrack-page">
    <header class="soundtrack-hero">
      <nav class="soundtrack-nav">
        <a class="back-link" href="index.html">← Back to map</a>
      </nav>

      <div class="soundtrack-hero-main">
        <div>
          <p class="eyebrow">Road Trip 2K15</p>
          <h1>Soundtrack</h1>
        </div>

        <div class="soundtrack-summary">
          <div class="summary-card">
            <span class="summary-value" id="track-count">42</span>
            <span class="summary-label">Tracks</span>
          </div>
        </div>
      </div>
    </header>

    <main class="soundtrack-main">
      <section class="player-shell">
        <div class="player-copy">
          <p class="section-kicker">YouTube Music Playlist</p>
          <h2 id="playlist-title">The songs from the summer</h2>
        </div>

        <div class="player-stage">
          <div class="playlist-frame-wrap" id="playlist-frame-wrap">
            <div class="playlist-placeholder">
              <strong>Playlist not connected yet</strong>
              <span>Add your playlist ID or playlist URL in <code>data/soundtrack.json</code>.</span>
            </div>
          </div>
        </div>

        <div class="playlist-actions">
          <a class="playlist-link primary" id="youtube-music-link" href="#" target="_blank" rel="noopener noreferrer">
            Open in YouTube Music
          </a>

          <a class="playlist-link secondary" id="youtube-link" href="#" target="_blank" rel="noopener noreferrer">
            Open in YouTube
          </a>
        </div>
      </section>

      <section class="note-strip">
        <span>San Francisco</span>
        <span>Desert drives</span>
        <span>Vegas</span>
        <span>National parks</span>
        <span>New York</span>
        <span>Miami</span>
      </section>
    </main>
  </div>

  <script src="js/soundtrack.js"></script>
</body>
</html>
