<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RT2K15 · Itinerary</title>
  <link rel="stylesheet" href="itinerary.css" />
</head>
<body>
  <main class="page-shell">
    <header class="itinerary-hero">
<nav class="home-desktop-nav" aria-label="Road Trip sections">
  <a class="home-desktop-nav-link" href="index.html">ROUTE</a>
  <a class="home-desktop-nav-link active" href="itinerary.html" aria-current="page">ITINERARY</a>
  <a class="home-desktop-nav-link" href="cities.html">CITIES</a>
  <a class="home-desktop-nav-link" href="parks.html">NATURE</a>
  <a class="home-desktop-nav-link" href="sports.html">SPORTS</a>
  <a class="home-desktop-nav-link" href="events.html">EVENTS</a>
  <a class="home-desktop-nav-link" href="soundtrack.html">SOUNDTRACK</a>
</nav>
</header>

    <section class="itinerary-controls" aria-label="Itinerary controls">
      <label class="search-box">
        <span>Search itinerary</span>
        <input id="itinerary-search" type="search" placeholder="Search city, event, venue, day..." autocomplete="off" />
      </label>

      <div class="filter-row" role="group" aria-label="Filter itinerary">
        <button class="filter-btn active" type="button" data-filter="all">All</button>
        <button class="filter-btn" type="button" data-filter="drive">Drives</button>
        <button class="filter-btn" type="button" data-filter="stay">Stays</button>
        <button class="filter-btn" type="button" data-filter="event">Events</button>
      </div>
    </section>
<section class="timeline-shell">
      <div class="list-status" id="list-status">Loading itinerary…</div>
      <div class="itinerary-list" id="itinerary-list"></div>
      <div class="empty-state" id="empty-state" hidden>
        <strong>No matching days</strong>
        <span>Try clearing the search or changing the filter.</span>
      </div>
    </section>
  </main>

  <script src="js/itinerary.js"></script>
</body>
</html>
