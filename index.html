<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>RT2K15 - AMERICA & CANADA ROAD TRIP</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="map"></div>

  <nav class="home-desktop-nav" aria-label="Road Trip sections">
    <a class="home-desktop-nav-link active" href="index.html" aria-current="page">ROUTE</a>
    <a class="home-desktop-nav-link" href="itinerary.html">ITINERARY</a>
    <a class="home-desktop-nav-link" href="cities.html">CITIES</a>
    <a class="home-desktop-nav-link" href="parks.html">NATURE</a>
    <a class="home-desktop-nav-link" href="sports.html">SPORTS</a>
    <a class="home-desktop-nav-link" href="events.html">EVENTS</a>
    <a class="home-desktop-nav-link" href="soundtrack.html">SOUNDTRACK</a>
  </nav>

  <!-- map.js builds the full menu inside this -->
  <div id="trip-menu"></div>

  <aside class="day-detail" id="day-detail" aria-hidden="true">
    <button class="close-btn" id="close-detail" aria-label="Close">×</button>
    <div class="detail-content" id="detail-content"></div>
  </aside>

  <div class="timeline">
    <div class="controller-brand">
      <div class="controller-brand-line">
        <span class="controller-brand-title">RT2K15</span>
        <span class="controller-brand-flags" aria-label="United States and Canada road trip">
          <img src="assets/flags/us.svg" alt="United States flag" />
          <img src="assets/flags/ca.svg" alt="Canada flag" />
        </span>
      </div>

      <div class="controller-brand-subtitle">United States &amp; Canada Road Trip</div>

      <div class="controller-trip-stats" aria-label="Trip summary">
        <span class="controller-trip-stat controller-trip-stat-long">
          <strong id="dash-sports-venues">0</strong>
          <em>Sports Venues</em>
        </span>

        <span class="controller-trip-stat">
          <strong id="dash-states">0</strong>
          <em>States</em>
        </span>

        <span class="controller-trip-stat">
          <strong id="dash-cities">0</strong>
          <em>Cities</em>
        </span>
      </div>
    </div>

    <div class="timeline-top">
      <div class="timeline-main-counter">
        <span class="timeline-day-value">
          <span id="current-day">90</span>
          <span class="timeline-slash">/</span>
          <span id="total-days">90</span>
        </span>
        <span class="timeline-day-label">Day</span>
      </div>

      <button class="play-btn" id="play-btn" aria-label="Play">
        ▶
      </button>

      <div class="timeline-percent-box">
        <span class="timeline-percent-value" id="trip-percent">100%</span>
        <span class="timeline-percent-label">Complete</span>
      </div>
    </div>

    <div class="timeline-stats">
      <span class="timeline-stat-box">
        <span class="timeline-stat-value">
          <strong id="driven-kilometres">0</strong>
        </span>
        <span class="timeline-stat-label">Kilometres</span>
      </span>

      <span class="timeline-stat-box">
        <span class="timeline-stat-value">
          <strong id="driven-distance">15,809</strong>
        </span>
        <span class="timeline-stat-label">Miles</span>
      </span>

      <span class="timeline-stat-box">
        <span class="timeline-stat-value">
          <strong id="driven-time">228h 36m</strong>
        </span>
        <span class="timeline-stat-label">Drive time</span>
      </span>
    </div>

    <div class="timeline-track">
      <input
        type="range"
        id="timeline-slider"
        min="1"
        max="90"
        value="90"
        step="1"
        aria-label="Trip day"
      />

      <div class="timeline-labels">
        <span>18 Jun</span>
        <span>Jul</span>
        <span>Aug</span>
        <span>16 Sep</span>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/map.js"></script>
  <script src="js/timeline.js"></script>
</body>
</html>
