<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>RT2K15</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="map"></div>

  <!-- map.js builds the full menu inside this -->
  <div id="trip-menu"></div>

  <aside class="day-detail" id="day-detail" aria-hidden="true">
    <button class="close-btn" id="close-detail" aria-label="Close">×</button>
    <div class="detail-content" id="detail-content"></div>
  </aside>

  <div class="timeline">
    <div class="timeline-top">
      <button class="play-btn" id="play-btn" aria-label="Play">
        ▶
      </button>

      <div class="timeline-main-counter">
        <span class="timeline-day-label">Day</span>
        <span id="current-day">90</span>
        <span class="timeline-slash">/</span>
        <span id="total-days">90</span>
      </div>
    </div>

<div class="timeline-stats">
  <span class="timeline-stat-box">
    <span class="timeline-stat-label">Kilometres</span>
    <span class="timeline-stat-value">
      <strong id="driven-kilometres">25,442</strong> km
    </span>
  </span>

  <span class="timeline-stat-box">
    <span class="timeline-stat-label">Miles</span>
    <span class="timeline-stat-value">
      <strong id="driven-distance">15,809</strong> mi
    </span>
  </span>

  <span class="timeline-stat-box">
    <span class="timeline-stat-label">Drive time</span>
    <span class="timeline-stat-value">
      <strong id="driven-time">228h 36m</strong>
    </span>
  </span>
</div>

    <div class="timeline-track">
      <input
        type="range"
        id="timeline-slider"
        min="1"
        max="90"
        value="90"
        step="1"
        aria-label="Trip day"
      />

      <div class="timeline-labels">
        <span>18 Jun</span>
        <span>Jul</span>
        <span>Aug</span>
        <span>16 Sep</span>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/map.js"></script>
  <script src="js/timeline.js"></script>
</body>
</html>
